name: Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/openhealth-web

jobs:
  # ============================================================
  # JOB 1: Build e Push da imagem Docker para o Docker Hub
  # ============================================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    # Só faz push para o registry em commits na main (não em PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2: Deploy na VPS via SSH
  # ============================================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Copiar docker-compose do MinIO para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "back-end/docker-compose.yml"
          target: "/opt/openhealth"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "🔐 Login no Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # ── Rede compartilhada ──────────────────────────────────
            echo "🌐 Criando rede Docker (se não existir)..."
            docker network create openhealth-net 2>/dev/null || true

            # ── MinIO via Docker Compose ────────────────────────────
            echo "📦 Subindo MinIO via docker-compose..."
            cd /opt/openhealth
            MINIO_ROOT_USER="${{ secrets.MINIO_ROOT_USER }}" \
            MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}" \
            MINIO_BUCKET_NAME="${{ secrets.MINIO_BUCKET_NAME }}" \
            docker compose up -d --force-recreate --remove-orphans

            # Conecta o container do MinIO à rede compartilhada
            docker network connect openhealth-net openhealth-minio 2>/dev/null || true

            # ── Aplicação principal ─────────────────────────────────
            echo "📦 Baixando imagem mais recente..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/openhealth-web:latest

            echo "🛑 Parando container antigo (se existir)..."
            docker stop openhealth-web 2>/dev/null || true
            docker rm openhealth-web 2>/dev/null || true

            echo "🚀 Iniciando novo container..."
            docker run -d \
              --name openhealth-web \
              --restart always \
              --network host \
              -e PORT=8001 \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_CHARSET="${{ secrets.DB_CHARSET }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION_HOURS="${{ secrets.JWT_EXPIRATION_HOURS }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              -e MINIO_ENDPOINT="openhealth-minio:9000" \
              -e MINIO_ACCESS_KEY="${{ secrets.MINIO_ROOT_USER }}" \
              -e MINIO_SECRET_KEY="${{ secrets.MINIO_ROOT_PASSWORD }}" \
              -e MINIO_BUCKET_NAME="${{ secrets.MINIO_BUCKET_NAME }}" \
              -e MINIO_USE_SSL="false" \
              -e OBJ_KEY="${{ secrets.OBJ_KEY }}" \
              -e GIN_MODE="release" \
              --memory=256m \
              ${{ secrets.DOCKERHUB_USERNAME }}/openhealth-web:latest

            echo "🧹 Limpando imagens antigas..."
            docker image prune -af --filter "until=168h"

            echo "✅ Deploy concluído com sucesso!"

